# =============================================================
# .github/workflows/cd.yml — Continuous Deployment
# =============================================================
# Triggers ONLY after CI passes on the main branch.
#
# What it does:
#   1. SSH into your VPS
#   2. git pull latest code
#   3. docker compose build (rebuild image)
#   4. docker compose up -d (restart container, zero-downtime swap)
#   5. Health check — verify container is running
#   6. Post deployment summary to GitHub
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SSH_HOST        → your VPS IP address (e.g. 123.45.67.89)
#   SSH_USER        → SSH username (e.g. root or scraper)
#   SSH_PRIVATE_KEY → your private SSH key (cat ~/.ssh/id_ed25519)
#   SSH_PORT        → SSH port (usually 22)
#   DEPLOY_PATH     → absolute path on VPS (e.g. /home/scraper/g7-scraper)
# =============================================================

name: CD

on:
  # Auto-trigger: only deploy when CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

  # Manual trigger: deploy any time from GitHub Actions tab
  workflow_dispatch:
    inputs:
      run_now:
        description: "Run scraper immediately after deploy?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Only one deployment at a time
concurrency:
  group: cd-production
  cancel-in-progress: false   # never cancel an in-progress deploy

jobs:
  deploy:
    name:  Deploy to VPS
    runs-on: ubuntu-latest

    # For workflow_run trigger: only deploy if CI actually passed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: production
      url: "ssh://${{ secrets.SSH_HOST }}"

    steps:
      # ── 1. Show what we're deploying ────────────────────────
      - name: Deployment info
        run: |
          echo "========================================"
          echo "  Deploying G7 Scraper to VPS"
          echo "  Host  : ${{ secrets.SSH_HOST }}"
          echo "  User  : ${{ secrets.SSH_USER }}"
          echo "  Path  : ${{ secrets.DEPLOY_PATH }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Time  : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "========================================"

      # ── 2. Set up SSH agent ─────────────────────────────────
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ── 3. Add server to known_hosts (avoid interactive prompt) ──
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Deploy via SSH ────────────────────────────────────
      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RUN_NOW: ${{ github.event.inputs.run_now || 'false' }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << DEPLOY_EOF
            set -e

            echo ""
            echo "=== STEP 1: Pull latest code ==="
            cd "$DEPLOY_PATH"
            git pull origin main --ff-only

            echo ""
            echo "=== STEP 2: Rebuild Docker image ==="
            docker compose build --no-cache

            echo ""
            echo "=== STEP 3: Restart container ==="
            docker compose down --timeout 30
            RUN_NOW="$RUN_NOW" docker compose up -d

            echo ""
            echo "=== STEP 4: Health check ==="
            sleep 5
            STATUS=\$(docker compose ps --format json | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          # Handle both array and newline-delimited JSON
          try:
              services = json.loads(data)
              if isinstance(services, dict):
                  services = [services]
          except:
              services = [json.loads(line) for line in data.splitlines() if line.strip()]
          running = [s for s in services if s.get('State') == 'running']
          print(f'Running: {len(running)}/{len(services)} container(s)')
          exit(0 if running else 1)
          ")
            echo "\$STATUS"

            echo ""
            echo "=== Deployment complete  ==="
            echo "Container status:"
            docker compose ps
          DEPLOY_EOF

      # ── 5. Run scraper now (manual trigger only) ────────────
      - name: Run scraper immediately (manual trigger)
        if: github.event.inputs.run_now == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            cd "$DEPLOY_PATH"
            echo "Running scraper now..."
            docker exec g7_scraper python main.py &
            echo "Scraper started in background (PID: $!)"
          EOF

      # ── 6. Notify on failure ─────────────────────────────────
      - name: Notify on deployment failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED — check the logs above!"
          echo "To rollback: git revert HEAD && git push on your VPS"
