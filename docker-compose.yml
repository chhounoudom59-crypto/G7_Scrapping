version: "3.9"

services:
  g7-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: g7_scraper
    restart: unless-stopped

    environment:
      # Set to "false" to skip running immediately on container start
      # and only rely on the cron schedule (06:00 UTC daily).
      RUN_NOW: "true"

    volumes:
      # Mount data directory on host so output persists across
      # container restarts and rebuilds.
      - ./data:/app/data
      - ./logs:/app/logs

    # Resource limits — adjust for your VPS size.
    # Playwright/Chromium can be memory-hungry.
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
