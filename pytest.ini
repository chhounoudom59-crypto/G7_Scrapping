[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
    -q

# Markers
markers =
    unit: pure unit tests (no I/O)
    integration: tests that touch disk or network
    slow: tests that take more than 1 second
